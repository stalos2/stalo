<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics - St. Aloysius</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="bg-dark text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 text-uppercase">St. Aloysius</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a href="index.html" class="nav-link text-white">Home</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link text-white">About</a></li>
                    <li class="nav-item"><a href="academics.html" class="nav-link text-white">Academics</a></li>
                    <li class="nav-item"><a href="admissions.html" class="nav-link text-white">Admissions</a></li>
                    <li class="nav-item"><a href="events.html" class="nav-link text-white">Events</a></li>
                    <li class="nav-item"><a href="gallery.html" class="nav-link text-white">Gallery</a></li>
                    <li class="nav-item"><a href="admin-dashboard.html" class="nav-link text-white">Admin Dashboard</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Enhanced Academics Section with Filters and Modals -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center text-primary mb-4">Academics</h2>

            <!-- Filters -->
            <div class="mb-4 d-flex justify-content-between">
                <select id="category-filter" class="form-select w-50">
                    <option value="">All Categories</option>
                    <option value="O-Level">O-Level</option>
                    <option value="A-Level">A-Level</option>
                    <option value="Sciences">Sciences</option>
                    <option value="Arts">Arts</option>
                    <option value="Business">Business</option>
                </select>
                <button id="export-pdf" class="btn btn-outline-primary">Export to PDF</button>
            </div>

            <!-- Academic Programs Accordion -->
            <div id="academic-programs" class="accordion">
                <!-- Dynamic content will be loaded here -->
            </div>

            <!-- Pagination -->
            <nav aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- Pagination buttons will be dynamically added here -->
                </ul>
            </nav>
        </div>
    </section>

    <!-- Program Details Modal -->
    <div class="modal fade" id="program-details-modal" tabindex="-1" aria-labelledby="programDetailsLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="programDetailsLabel">Program Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="program-details-content">Loading...</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const academicProgramsContainer = document.getElementById('academic-programs');
            const categoryFilter = document.getElementById('category-filter');
            const paginationContainer = document.getElementById('pagination');
            const exportPdfButton = document.getElementById('export-pdf');
            const programDetailsModal = new bootstrap.Modal(document.getElementById('program-details-modal'));
            const programDetailsContent = document.getElementById('program-details-content');

            let currentPage = 1;
            const itemsPerPage = 5;
            let allPrograms = [];

            // Fetch academic programs from the backend
            const fetchPrograms = (category = '', page = 1) => {
                academicProgramsContainer.innerHTML = '<div class="text-center"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></div>';
                fetch(`/api/content?category=${category}&page=${page}&limit=${itemsPerPage}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.programs && data.programs.length > 0) {
                            allPrograms = data.programs;
                            renderPrograms(allPrograms);
                            renderPagination(data.totalPages, page);
                        } else {
                            academicProgramsContainer.innerHTML = '<p class="text-center">No academic programs found.</p>';
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching academic programs:', error);
                        academicProgramsContainer.innerHTML = '<p class="text-center text-danger">Failed to load academic programs. Please try again later.</p>';
                    });
            };

            // Render academic programs
            const renderPrograms = (programs) => {
                academicProgramsContainer.innerHTML = '';
                programs.forEach((program, index) => {
                    const programItem = document.createElement('div');
                    programItem.className = 'accordion-item';
                    programItem.innerHTML = `
                        <h2 class="accordion-header" id="heading${index}">
                            <button class="accordion-button ${index === 0 ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" aria-expanded="${index === 0}" aria-controls="collapse${index}">
                                ${program.page}
                            </button>
                        </h2>
                        <div id="collapse${index}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" aria-labelledby="heading${index}" data-bs-parent="#academic-programs">
                            <div class="accordion-body">
                                ${program.content}
                                <button class="btn btn-link" onclick="showProgramDetails('${program.page}', '${program.content}')">View Details</button>
                            </div>
                        </div>
                    `;
                    academicProgramsContainer.appendChild(programItem);
                });
            };

            // Render pagination
            const renderPagination = (totalPages, currentPage) => {
                paginationContainer.innerHTML = '';
                for (let i = 1; i <= totalPages; i++) {
                    const pageItem = document.createElement('li');
                    pageItem.className = `page-item ${i === currentPage ? 'active' : ''}`;
                    pageItem.innerHTML = `<a class="page-link" href="#">${i}</a>`;
                    pageItem.addEventListener('click', (e) => {
                        e.preventDefault();
                        fetchPrograms(categoryFilter.value, i);
                    });
                    paginationContainer.appendChild(pageItem);
                }
            };

            // Show program details in modal
            const showProgramDetails = (title, content) => {
                document.getElementById('programDetailsLabel').textContent = title;
                programDetailsContent.textContent = content;
                programDetailsModal.show();
            };

            // Export to PDF
            exportPdfButton.addEventListener('click', () => {
                const doc = new jsPDF();
                doc.text('Academic Programs', 10, 10);
                allPrograms.forEach((program, index) => {
                    doc.text(`${index + 1}. ${program.page}`, 10, 20 + index * 10);
                });
                doc.save('academic-programs.pdf');
            });

            // Filter by category
            categoryFilter.addEventListener('change', () => {
                fetchPrograms(categoryFilter.value, 1);
            });

            // Initial fetch
            fetchPrograms();
        });
    </script>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 St. Aloysius Senior Secondary School Nabbingo. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
